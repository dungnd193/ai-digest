{{ define "main" }}
  <h1>{{ .Site.Title }}</h1>
  {{ range .Pages.GroupByDate "2006-01-02" }}
    <section>
      <h2>{{ .Key }}</h2>
      <ul>
        {{ range .Pages }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            {{ with .Params.category }}<em>[{{ . }}]</em>{{ end }}
            <p>{{ .Summary }}</p>
          </li>
        {{ end }}
      </ul>
    </section>
  {{ end }}
{{ end }}
