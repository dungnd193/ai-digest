{{ define "main" }}
  <article>
    <div class="article-head">
      <div class="meta">
        <time>{{ .Date.Format "January 2, 2006" }}</time>
        {{ with .Params.category }}<span class="sep">·</span><span class="badge">{{ . }}</span>{{ end }}
      </div>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}<p style="color:var(--muted);font-size:1.1rem;margin:0;">{{ . }}</p>{{ end }}
    </div>

    <div class="prose">{{ .Content }}</div>

    {{ with .Params.tags }}
      <div class="tags">
        {{ range . }}<a href="{{ "tags/" | relLangURL }}{{ . | urlize }}/">#{{ . }}</a>{{ end }}
      </div>
    {{ end }}

    <a class="back" href="{{ "/" | relLangURL }}">← {{ .Site.Title }}</a>
  </article>
{{ end }}
