schedule: daily                       # informational; real scheduling is via cron
model_mode: claude_only               # wired: claude_only | both | ollama_only
languages: [en, vi]                   # wired
vi_keep_english_terms: true           # informational; the translator prompt always keeps EN terms
articles_per_run: 6                   # wired: cap per run (interleaved across sources for diversity)
translator_mode: draft_then_review    # wired: gemma_only | draft_then_review | claude_only
approval_required: false              # wired: false = auto-publish (no Telegram buttons)
categories: [Research, Tools, Industry, Tutorial, Opinion]   # wired
discovery:
  enabled: true                       # wired
  keywords:                           # wired: Tavily daily search topics
    - "latest AI news"
    - "trending AI models"
    - "new LLM release"
    - "AI research breakthrough"
    - "AI startup funding"
steps:
  digest: true                        # informational
  blog: true                          # informational
  publish: true                       # wired: false = dry-run (write files locally, do NOT git push)
notify:
  telegram_daily_summary: true        # informational; Reporter always sends a summary
  telegram_error_alert: true          # informational
